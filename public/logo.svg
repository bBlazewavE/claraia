<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2440"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- C letter -->
  <text x="130" y="360" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="320" fill="white">C</text>
  <!-- IA text -->
  <text x="295" y="360" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="200" fill="url(#accent)">IA</text>
  <!-- Neural dot accent -->
  <circle cx="420" cy="140" r="16" fill="#3b82f6" opacity="0.6"/>
  <circle cx="460" cy="180" r="10" fill="#60a5fa" opacity="0.4"/>
  <circle cx="380" cy="120" r="8" fill="#93c5fd" opacity="0.3"/>
</svg>
